<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis AI | Seu Assistente de Tênis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="icon">🎾</span>
                <h1>Tennis AI</h1>
            </div>
            <p>Especialista em jogadores, torneios e estatísticas.</p>
        </header>

        <main class="chat-container" id="chat-container">
            <div class="chat-messages" id="chat-messages">
                <div class="message bot">
                    <div class="bubble">
                        Olá! Bem-vindo ao Tennis AI. Pergunte-me qualquer coisa sobre o mundo do tênis!
                    </div>
                </div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Pergunte sobre Federer, Nadal, Grand Slams..." autocomplete="off">
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Tennis AI - Powered by NLTK & Flask</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
