<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="racket" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="handle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="ball" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#f0ff6b"/>
      <stop offset="100%" stop-color="#dfff4f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ballglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="#38bdf8" stroke-width="4" opacity="0.95"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="244" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.3"/>

  <!-- Racket head (ellipse) -->
  <ellipse cx="240" cy="195" rx="105" ry="130" fill="none" stroke="url(#racket)" stroke-width="18" filter="url(#glow)" transform="rotate(-25, 240, 195)"/>

  <!-- Racket strings - vertical -->
  <g stroke="#38bdf8" stroke-width="3" opacity="0.35" transform="rotate(-25, 240, 195)">
    <line x1="185" y1="100" x2="185" y2="290"/>
    <line x1="210" y1="78" x2="210" y2="312"/>
    <line x1="240" y1="65" x2="240" y2="325"/>
    <line x1="270" y1="78" x2="270" y2="312"/>
    <line x1="295" y1="100" x2="295" y2="290"/>
  </g>

  <!-- Racket strings - horizontal -->
  <g stroke="#38bdf8" stroke-width="3" opacity="0.35" transform="rotate(-25, 240, 195)">
    <line x1="145" y1="130" x2="335" y2="130"/>
    <line x1="138" y1="160" x2="342" y2="160"/>
    <line x1="135" y1="195" x2="345" y2="195"/>
    <line x1="138" y1="230" x2="342" y2="230"/>
    <line x1="145" y1="260" x2="335" y2="260"/>
  </g>

  <!-- Clip strings to racket head -->
  <defs>
    <clipPath id="racketClip">
      <ellipse cx="240" cy="195" rx="96" ry="121" transform="rotate(-25, 240, 195)"/>
    </clipPath>
  </defs>

  <!-- Strings clipped -->
  <g clip-path="url(#racketClip)">
    <g stroke="#38bdf8" stroke-width="2.5" opacity="0.4" transform="rotate(-25, 240, 195)">
      <line x1="185" y1="70" x2="185" y2="320"/>
      <line x1="210" y1="70" x2="210" y2="320"/>
      <line x1="240" y1="70" x2="240" y2="320"/>
      <line x1="270" y1="70" x2="270" y2="320"/>
      <line x1="295" y1="70" x2="295" y2="320"/>
      <line x1="130" y1="130" x2="350" y2="130"/>
      <line x1="130" y1="162" x2="350" y2="162"/>
      <line x1="130" y1="195" x2="350" y2="195"/>
      <line x1="130" y1="228" x2="350" y2="228"/>
      <line x1="130" y1="260" x2="350" y2="260"/>
    </g>
  </g>

  <!-- Racket head (on top of strings) -->
  <ellipse cx="240" cy="195" rx="105" ry="130" fill="none" stroke="url(#racket)" stroke-width="16" transform="rotate(-25, 240, 195)"/>

  <!-- Handle -->
  <rect x="290" y="340" width="28" height="120" rx="14" fill="url(#handle)" stroke="#38bdf8" stroke-width="4" transform="rotate(-25, 304, 400)"/>

  <!-- Grip lines on handle -->
  <g stroke="#38bdf8" stroke-width="2" opacity="0.3" transform="rotate(-25, 304, 400)">
    <line x1="293" y1="360" x2="315" y2="360"/>
    <line x1="293" y1="375" x2="315" y2="375"/>
    <line x1="293" y1="390" x2="315" y2="390"/>
    <line x1="293" y1="405" x2="315" y2="405"/>
    <line x1="293" y1="420" x2="315" y2="420"/>
    <line x1="293" y1="435" x2="315" y2="435"/>
  </g>

  <!-- Tennis ball -->
  <circle cx="370" cy="120" r="48" fill="url(#ball)" filter="url(#ballglow)"/>

  <!-- Ball seam curve -->
  <path d="M340,85 Q370,120 340,155" fill="none" stroke="#b8cc30" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M400,85 Q370,120 400,155" fill="none" stroke="#b8cc30" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Ball highlight -->
  <circle cx="358" cy="108" r="14" fill="white" opacity="0.2"/>
</svg>
